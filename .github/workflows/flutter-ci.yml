name: Flutter 持续集成

# 在每次 Push / PR 时自动执行：静态检查 + 单元测试（含覆盖率）

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: 分析与测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true # 启用 Flutter SDK 缓存

      - name: 获取依赖
        run: flutter pub get

      - name: 静态检查
        run: |
          if ! flutter analyze; then
            echo "## ❌ 静态检查失败" >> $GITHUB_STEP_SUMMARY
            echo "请在本地执行 \`flutter analyze\` 修复所有 error/warning 后再推送。" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "## ✅ 静态检查通过" >> $GITHUB_STEP_SUMMARY

      - name: 测试目录静态检查
        run: |
          if ! dart analyze test; then
            echo "## ❌ 测试目录静态检查失败" >> $GITHUB_STEP_SUMMARY
            echo "请在本地执行 \`dart analyze test\` 修复 test/ 下所有问题后再推送。" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "## ✅ 测试目录静态检查通过" >> $GITHUB_STEP_SUMMARY

      - name: Go 服务端编译检查
        run: |
          cd server
          if ! go test ./...; then
            echo "## ❌ Go test 失败" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          if ! go test -race ./...; then
            echo "## ❌ Go race test 失败" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          if ! go vet ./...; then
            echo "## ❌ Go vet 失败" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          if ! go build ./...; then
            echo "## ❌ Go build 失败" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "## ✅ Go 服务端测试与编译检查通过" >> $GITHUB_STEP_SUMMARY

      - name: AI 工程门禁检查
        run: |
          if ! dart scripts/ai_code_checker.dart; then
            echo "## ❌ AI 工程门禁失败" >> $GITHUB_STEP_SUMMARY
            echo "请在本地执行 \`dart scripts/ai_code_checker.dart\` 修复阻断项后再推送。" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "## ✅ AI 工程门禁通过" >> $GITHUB_STEP_SUMMARY

      - name: 安装覆盖率工具
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov

      - name: 运行测试并生成覆盖率
        shell: bash
        run: |
          set +e
          test_status=0
          test_index=0
          coverage_files=()
          while IFS= read -r test_file; do
            json_path="$RUNNER_TEMP/flutter-test-$test_index.jsonl"
            stderr_path="$RUNNER_TEMP/flutter-test-$test_index-stderr.log"
            coverage_path="coverage/lcov.$test_index.info"
            flutter test --coverage --coverage-path="$coverage_path" \
              --concurrency=1 --reporter json "$test_file" \
              > "$json_path" 2> "$stderr_path"
            file_status=$?
            if [ "$file_status" -ne 0 ]; then
              test_status=1
              echo "::error title=Flutter Test Process::$test_file exit=$file_status"
            fi
            coverage_files+=("$coverage_path")
            test_index=$((test_index + 1))
          done < <(find test -name '*_test.dart' -print | sort)

          merge_status=0
          first_coverage=1
          for coverage_path in "${coverage_files[@]}"; do
            if [ ! -s "$coverage_path" ]; then
              merge_status=1
              echo "::error title=Coverage Merge::缺少覆盖率文件 $coverage_path"
              continue
            fi
            if [ "$first_coverage" -eq 1 ]; then
              cp "$coverage_path" coverage/lcov.info
              first_coverage=0
            else
              lcov --add-tracefile coverage/lcov.info \
                --add-tracefile "$coverage_path" \
                --output-file coverage/lcov.merged.info \
                > "$RUNNER_TEMP/lcov-merge.log" 2>&1
              if [ "$?" -ne 0 ]; then
                merge_status=1
                cat "$RUNNER_TEMP/lcov-merge.log"
                break
              fi
              mv coverage/lcov.merged.info coverage/lcov.info
            fi
          done
          if [ "$merge_status" -ne 0 ]; then
            test_status=1
          fi
          if [ "$test_status" -ne 0 ]; then
            test_tail=$(tail -n 120 "$RUNNER_TEMP"/flutter-test-*.jsonl \
              "$RUNNER_TEMP"/flutter-test-*-stderr.log | tr '\n' ' ')
            echo "::error title=Flutter Test Process::merge=$merge_status $test_tail"
          fi
          python3 "$RUNNER_TEMP" "$GITHUB_STEP_SUMMARY" <<'PY'
          import json
          import glob
          import os
          import sys

          temp_dir = sys.argv[1]
          summary_path = sys.argv[2]
          failures = []
          raw_lines = []
          json_paths = sorted(glob.glob(os.path.join(temp_dir, "flutter-test-*.jsonl")))
          for path in json_paths:
              names = {}
              errors = {}
              with open(path, encoding="utf-8", errors="replace") as stream:
                  for line in stream:
                      try:
                          event = json.loads(line)
                      except json.JSONDecodeError:
                          if line.strip():
                              raw_lines.append(line.strip())
                          continue
                      if event.get("type") == "testStart":
                          test = event.get("test", {})
                          names[test.get("id")] = test.get("name", "未知测试")
                      elif event.get("type") == "error":
                          errors[event.get("testID")] = event.get("error", "无错误详情")
                      elif (
                          event.get("type") == "testDone"
                          and event.get("result") != "success"
                          and not event.get("skipped", False)
                      ):
                          test_id = event.get("testID")
                          detail = errors.get(test_id, "无错误详情").replace("\n", " ")
                          failures.append((names.get(test_id, "未知测试"), detail))

          stderr_lines = []
          for stderr_path in sorted(glob.glob(os.path.join(temp_dir, "flutter-test-*-stderr.log"))):
              with open(stderr_path, encoding="utf-8", errors="replace") as stream:
                  stderr_lines.extend(line.strip() for line in stream if line.strip())
          diagnostic_lines = [
              line for line in (stderr_lines + raw_lines)
              if any(
                  token in line
                  for token in (
                      "RenderFlex",
                      "overflow",
                      "Exception",
                      "Expected:",
                      "Actual:",
                      "Failed assertion",
                      "FlutterError",
                      "MissingPlugin",
                  )
              )
          ]
          stderr_detail = " ".join(diagnostic_lines[-12:])

          for name, detail in failures:
              generic = detail.startswith("Test failed. See exception logs above.")
              extra = stderr_detail[:500] if generic and stderr_detail else detail[:500]
              print(f"::error title=Flutter 测试失败::{name}: {extra}")
          if failures:
              with open(summary_path, "a", encoding="utf-8") as summary:
                  print("## Flutter 测试失败明细", file=summary)
                  for name, detail in failures:
                      generic = detail.startswith("Test failed. See exception logs above.")
                      extra = stderr_detail[:500] if generic and stderr_detail else detail[:500]
                      print(f"- `{name}`：{extra}", file=summary)
          PY
          exit "$test_status"

      - name: 校验覆盖率门槛（总体 ≥ 80%，核心文件 ≥ 90%）
        shell: bash
        run: |
          set +e
          gate_output=$(python scripts/check_coverage_gate.py --overall 80 --core 90 2>&1)
          gate_status=$?
          printf '%s\n' "$gate_output" | tee -a "$GITHUB_STEP_SUMMARY"
          while IFS= read -r line; do
            case "$line" in
              *"[GATE]"*|*"[FAIL]"*)
                echo "::error title=Coverage Gate::$line"
                ;;
            esac
          done <<< "$gate_output"
          if [ "$gate_status" -ne 0 ]; then
            gate_one_line=$(printf '%s' "$gate_output" | tr '\n' ' ')
            echo "::error title=Coverage Gate::$gate_one_line"
          fi
          exit "$gate_status"

      - name: 设置 .NET Core (ReportGenerator 依赖项)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: 生成覆盖率报告
        uses: danielpalme/ReportGenerator-GitHub-Action@5.4.16
        with:
          reports: coverage/lcov.info
          targetdir: coverage-report
          reporttypes: MarkdownSummaryGithub;Cobertura

      - name: 生成业务核心 LCOV（过滤 UI/生成代码）
        run: |
          awk '
            BEGIN{ FS=":" }
            /^SF:/ {
              path=substr($0,4);
              norm=path; gsub(/\\/, "/", norm); # 统一路径分隔符
              rel=norm;
              # lcov 的 SF 可能是绝对路径（如 /home/.../lib/xxx.dart），统一截取到 lib/ 之后
              sub(/^.*\/lib\//, "lib/", rel);
              sub(/\r$/, "", rel);
              inc=1;
              if (rel !~ /^lib\//) inc=0;                                 # 只统计 lib/ 下源码
              else if (rel ~ /^lib\/.*\/presentation\//) inc=0;          # UI 层
              else if (rel ~ /^lib\/shared\/widgets\//) inc=0;           # 通用控件
              else if (rel ~ /^lib\/core\/theme\//) inc=0;               # 主题样式（非业务逻辑）
              else if (rel ~ /\/generated\//) inc=0;                      # 生成目录
              else if (rel ~ /\.g\.dart$/) inc=0;                         # 生成文件
            }
            { if (inc==1) print $0 }
          ' coverage/lcov.info > coverage/lcov.core.info

      - name: 发布覆盖率摘要 (中文图表)
        run: |
          echo "## 📊 测试覆盖率报告 (中文)" >> $GITHUB_STEP_SUMMARY

          # 计算总体覆盖率并生成徽章（中文）
          perl -ne '
            if(/^LF:(\d+)/){$total+=$1}elsif(/^LH:(\d+)/){$covered+=$1}
            END {
              $pct = $total > 0 ? ($covered / $total * 100) : 0;
              $color = $pct >= 80 ? "green" : ($pct >= 50 ? "orange" : "red");
              printf "\n### 总体覆盖率：**%.2f%%**\n", $pct;
              printf "![覆盖率徽章](https://img.shields.io/badge/coverage-%.2f%%25-%s?style=for-the-badge)\n\n", $pct, $color;
              print "- **已覆盖行数**：$covered\n";
              print "- **总行数**：$total\n";
            }
          ' coverage/lcov.info >> $GITHUB_STEP_SUMMARY

          # 统计各文件覆盖率并输出（中文表格，全部模块）
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 模块覆盖率明细（全部模块）" >> $GITHUB_STEP_SUMMARY
          awk '
            BEGIN{ FS=":" }
            function norm(p,  rel) {
              rel=p;
              gsub(/\\/, "/", rel);
              sub(/^.*\/lib\//, "lib/", rel);
              sub(/\r$/, "", rel);
              return rel;
            }
            function module(rel,  a, n) {
              if (rel ~ /^lib\/features\//) {
                n=split(rel, a, "/");
                return n>=3 ? ("features/" a[3]) : "features";
              }
              if (rel ~ /^lib\/core\//) {
                n=split(rel, a, "/");
                return n>=3 ? ("core/" a[3]) : "core";
              }
              if (rel ~ /^lib\/shared\//) {
                n=split(rel, a, "/");
                return n>=3 ? ("shared/" a[3]) : "shared";
              }
              return "other";
            }
            /^SF:/ {
              file=substr($0,4);
              rel=norm(file);
              lf=0; lh=0;
              next
            }
            /^LF:/ { lf=$2+0; next }
            /^LH:/ { lh=$2+0; next }
            /^end_of_record/ {
              m=module(rel);
              mlf[m]+=lf;
              mlh[m]+=lh;
              next
            }
            END {
              for (m in mlf) {
                cov=(mlf[m]>0?mlh[m]/mlf[m]*100:0);
                printf("%0.2f\t%s\t%d/%d\n", cov, m, mlh[m], mlf[m]);
              }
            }
          ' coverage/lcov.info |
          sort -n |
          awk -F"\t" '
            function zh(m) {
              if (m=="features/reader") return "阅读器（features/reader）";
              if (m=="features/audio") return "音频（features/audio）";
              if (m=="features/game_2048") return "2048 游戏（features/game_2048）";
              if (m=="features/library") return "书库（features/library）";
              if (m=="features/settings") return "设置（features/settings）";
              if (m=="features/dashboard") return "主界面（features/dashboard）";
              if (m=="core/database") return "存储（core/database）";
              if (m=="core/config") return "配置（core/config）";
              if (m=="core/theme") return "主题（core/theme）";
              if (m=="core/constants") return "常量（core/constants）";
              if (m=="shared/widgets") return "通用控件（shared/widgets）";
              if (m=="shared") return "共享（shared）";
              if (m=="core") return "核心（core）";
              if (m=="features") return "功能（features）";
              if (m=="other") return "其他（other）";
              return m;
            }
            BEGIN { print "| 模块 | 覆盖率 | 行(覆盖/总) |"; print "|:--|:--:|:--:|" }
            { printf "| %s | %s%% | %s |\n", zh($2), $1, $3 }
          ' >> $GITHUB_STEP_SUMMARY

      - name: 校验业务核心覆盖率阈值 (≥ 90%)
        run: |
          THRESHOLD=90
          if [ ! -s coverage/lcov.core.info ]; then
            echo "❌ 未生成业务核心覆盖率文件 coverage/lcov.core.info" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          CORE_LF=$(awk -F: '/^LF:/{lf+=$2+0} END{ print lf+0 }' coverage/lcov.core.info)
          CORE_LH=$(awk -F: '/^LH:/{lh+=$2+0} END{ print lh+0 }' coverage/lcov.core.info)
          CORE_PCT=$(awk -v lh="$CORE_LH" -v lf="$CORE_LF" 'BEGIN{ if(lf>0) printf("%.2f", (lh/lf*100)); else print "0.00" }')

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅/❌ 覆盖率门槛（业务核心）" >> $GITHUB_STEP_SUMMARY
          echo "- **当前业务核心覆盖率**：${CORE_PCT}%" >> $GITHUB_STEP_SUMMARY
          echo "- **目标阈值**：≥ ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
          echo "- **统计行数**：${CORE_LH}/${CORE_LF}（覆盖/总）" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 统计口径（已过滤，不计入业务核心）" >> $GITHUB_STEP_SUMMARY
          echo "- lib/**/presentation/**（UI 层）" >> $GITHUB_STEP_SUMMARY
          echo "- lib/shared/widgets/**（通用控件）" >> $GITHUB_STEP_SUMMARY
          echo "- lib/core/theme/**（主题样式）" >> $GITHUB_STEP_SUMMARY
          echo "- **/generated/** 与 **/*.g.dart（生成代码）" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 业务核心模块覆盖率明细（全部模块）" >> $GITHUB_STEP_SUMMARY
          awk '
            BEGIN{ FS=":" }
            function norm(p,  rel) {
              rel=p;
              gsub(/\\/, "/", rel);
              sub(/^.*\/lib\//, "lib/", rel);
              sub(/\r$/, "", rel);
              return rel;
            }
            function module(rel,  a, n) {
              if (rel ~ /^lib\/features\//) {
                n=split(rel, a, "/");
                return n>=3 ? ("features/" a[3]) : "features";
              }
              if (rel ~ /^lib\/core\//) {
                n=split(rel, a, "/");
                return n>=3 ? ("core/" a[3]) : "core";
              }
              if (rel ~ /^lib\/shared\//) {
                n=split(rel, a, "/");
                return n>=3 ? ("shared/" a[3]) : "shared";
              }
              return "other";
            }
            /^SF:/ {
              file=substr($0,4);
              rel=norm(file);
              lf=0; lh=0;
              next
            }
            /^LF:/ { lf=$2+0; next }
            /^LH:/ { lh=$2+0; next }
            /^end_of_record/ {
              m=module(rel);
              mlf[m]+=lf;
              mlh[m]+=lh;
              next
            }
            END {
              for (m in mlf) {
                cov=(mlf[m]>0?mlh[m]/mlf[m]*100:0);
                printf("%0.2f\t%s\t%d/%d\n", cov, m, mlh[m], mlf[m]);
              }
            }
          ' coverage/lcov.core.info |
          sort -n |
          awk -F"\t" '
            function zh(m) {
              if (m=="features/reader") return "阅读器（features/reader）";
              if (m=="features/audio") return "音频（features/audio）";
              if (m=="features/game_2048") return "2048 游戏（features/game_2048）";
              if (m=="features/library") return "书库（features/library）";
              if (m=="features/settings") return "设置（features/settings）";
              if (m=="features/dashboard") return "主界面（features/dashboard）";
              if (m=="core/database") return "存储（core/database）";
              if (m=="core/config") return "配置（core/config）";
              if (m=="core/theme") return "主题（core/theme）";
              if (m=="core/constants") return "常量（core/constants）";
              if (m=="shared/widgets") return "通用控件（shared/widgets）";
              if (m=="shared") return "共享（shared）";
              if (m=="core") return "核心（core）";
              if (m=="features") return "功能（features）";
              if (m=="other") return "其他（other）";
              return m;
            }
            BEGIN { print "| 模块 | 覆盖率 | 行(覆盖/总) |"; print "|:--|:--:|:--:|" }
            { printf "| %s | %s%% | %s |\n", zh($2), $1, $3 }
          ' >> $GITHUB_STEP_SUMMARY

          PASS=$(awk -v pct="$CORE_PCT" -v thr="$THRESHOLD" 'BEGIN { if (pct+0 >= thr) print "yes"; else print "no" }')
          if [ "$PASS" != "yes" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ❌ 覆盖率未达标 — 本次 CI 失败，禁止合并" >> $GITHUB_STEP_SUMMARY
            echo "- **当前业务核心覆盖率**：${CORE_PCT}%" >> $GITHUB_STEP_SUMMARY
            echo "- **目标阈值**：≥ ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**修复建议**：优先为上方表格中覆盖率最低的模块补充单元测试（覆盖关键分支/异常分支）。" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "> ⚠️ 覆盖率门槛由 CI 强制执行，未达标时 **PR 无法合并**。请补充测试后重新提交。" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ✅ 覆盖率达标：${CORE_PCT}% ≥ ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 发布覆盖率评论
        uses: thollander/actions-comment-pull-request@v2
        if: github.event_name == 'pull_request'
        with:
          message: |
            ## 📊 测试覆盖率更新
            本次推送的测试覆盖率摘要已发布在 [Job Summary](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})。
          comment_tag: coverage-report

      - name: 上传覆盖率产物
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info

  release-apk:
    name: arm64 Release APK
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 获取依赖
        run: flutter pub get

      - name: 写入临时签名文件
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_STORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          mkdir -p android/ci-signing
          printf "%s" "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/ci-signing/release.jks
          echo "ANDROID_STORE_FILE=ci-signing/release.jks" >> "$GITHUB_ENV"
          echo "ANDROID_STORE_PASSWORD=$ANDROID_STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: 构建 arm64 Release APK
        env:
          TTS_SERVER_URL: ${{ vars.TTS_SERVER_URL }}
          BOOK_API_BASE: ${{ vars.BOOK_API_BASE }}
        run: |
          TTS_URL="${TTS_SERVER_URL:-https://hclstudio.cn/api/v1/tts}"
          BOOK_BASE="${BOOK_API_BASE:-https://hclstudio.cn/api/v1}"
          APP_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          VERSION_NAME="${APP_VERSION%%+*}"
          VERSION_CODE="${APP_VERSION##*+}"
          flutter build apk --release \
            --target-platform android-arm64 \
            --split-per-abi \
            --build-name="$VERSION_NAME" \
            --build-number="$VERSION_CODE" \
            --dart-define=TTS_SERVER_URL="$TTS_URL" \
            --dart-define=BOOK_API_BASE="$BOOK_BASE" \
            --dart-define=APP_VERSION="$VERSION_NAME"

      - name: 生成 APK SHA-256
        run: |
          sha256sum build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            > build/app/outputs/flutter-apk/app-arm64-v8a-release.apk.sha256

      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: yueyou-arm64-release-apk
