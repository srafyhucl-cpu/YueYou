name: Flutter 持续集成

# 在每次 Push / PR 时自动执行：静态检查 + 单元测试（含覆盖率）

on:
  push:
  pull_request:

env:
  # 提前启用 Node.js 24 以消除 Node.js 20 弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    name: 分析与测试
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 获取依赖
        run: flutter pub get

      - name: 静态检查
        run: flutter analyze --no-fatal-infos

      - name: 运行测试并生成覆盖率
        run: flutter test --coverage

      - name: 上传覆盖率产物
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
