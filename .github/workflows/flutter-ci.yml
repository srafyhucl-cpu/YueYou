name: Flutter 持续集成

# 在每次 Push / PR 时自动执行：静态检查 + 单元测试（含覆盖率）

on:
  push:
  pull_request:

jobs:
  build-test:
    name: 分析与测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true # 启用 Flutter SDK 缓存

      - name: 获取依赖
        run: flutter pub get

      - name: 静态检查
        run: flutter analyze --no-fatal-infos

      - name: 运行测试并生成覆盖率
        run: flutter test --coverage

      - name: 设置 .NET Core (ReportGenerator 依赖项)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: 生成覆盖率报告
        uses: danielpalme/ReportGenerator-GitHub-Action@5.4.16
        with:
          reports: coverage/lcov.info
          targetdir: coverage-report
          reporttypes: MarkdownSummaryGithub;Cobertura

      - name: 发布覆盖率摘要 (图表+数据)
        run: |
          echo "## 📊 测试覆盖率报告" >> $GITHUB_STEP_SUMMARY
          
          # 尝试从插件生成的报告中提取内容
          REPORT_FILE=$(find coverage-report -name "Summary*.md" -o -name "Summary*.markdown" | head -n 1)
          
          if [ -n "$REPORT_FILE" ] && [ -f "$REPORT_FILE" ]; then
            echo "✅ 使用插件生成的报告: $REPORT_FILE"
            cat "$REPORT_FILE" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ 插件报告未就绪，改用手动解析摘要"
            # 备选方案：使用 Perl 直接从 lcov.info 提取数据并生成 Shields.io 徽章图表
            perl -ne '
              if(/^LF:(\d+)/){$total+=$1}elsif(/^LH:(\d+)/){$covered+=$1}
              END {
                $pct = $total > 0 ? ($covered / $total * 100) : 0;
                $color = $pct >= 80 ? "green" : ($pct >= 50 ? "orange" : "red");
                printf "\n### 总体覆盖率: **%.2f%%**\n", $pct;
                printf "![Coverage](https://img.shields.io/badge/coverage-%.2f%25-%s?style=for-the-badge)\n\n", $pct, $color;
                print "| 项目 | 统计值 |\n| :--- | :--- |\n";
                print "| 已覆盖行数 | $covered |\n";
                print "| 总行数 | $total |\n";
              }
            ' coverage/lcov.info >> $GITHUB_STEP_SUMMARY
          fi

      - name: 发布覆盖率评论
        uses: thollander/actions-comment-pull-request@v2
        if: github.event_name == 'pull_request'
        with:
          message: |
            ## 📊 测试覆盖率更新
            本次推送的测试覆盖率摘要已发布在 [Job Summary](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})。
          comment_tag: coverage-report

      - name: 上传覆盖率产物
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
