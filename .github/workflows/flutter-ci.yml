name: Flutter 持续集成

# 在每次 Push / PR 时自动执行：静态检查 + 单元测试（含覆盖率）

on:
  push:
  pull_request:

jobs:
  build-test:
    name: 分析与测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true # 启用 Flutter SDK 缓存

      - name: 获取依赖
        run: flutter pub get

      - name: 静态检查
        run: flutter analyze --no-fatal-infos

      - name: 运行测试并生成覆盖率
        run: flutter test --coverage

      - name: 设置 .NET Core (ReportGenerator 依赖项)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: 生成覆盖率报告
        uses: danielpalme/ReportGenerator-GitHub-Action@5.4.16
        with:
          reports: coverage/lcov.info
          targetdir: coverage-report
          reporttypes: MarkdownSummaryGithub;Cobertura

      - name: 发布覆盖率摘要到 Job Summary
        run: cat coverage-report/Summary.markdown >> $GITHUB_STEP_SUMMARY

      - name: 发布覆盖率评论
        uses: thollander/actions-comment-pull-request@v2
        if: github.event_name == 'pull_request'
        with:
          filePath: coverage-report/Summary.markdown

      - name: 上传覆盖率产物
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
