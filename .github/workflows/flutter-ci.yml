name: Flutter 持续集成

# 在每次 Push / PR 时自动执行：静态检查 + 单元测试（含覆盖率）

on:
  push:
  pull_request:

jobs:
  build-test:
    name: 分析与测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true # 启用 Flutter SDK 缓存

      - name: 获取依赖
        run: flutter pub get

      - name: 静态检查
        run: flutter analyze --no-fatal-infos

      - name: 运行测试并生成覆盖率
        run: flutter test --coverage

      - name: 设置 .NET Core (ReportGenerator 依赖项)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: 生成覆盖率报告
        uses: danielpalme/ReportGenerator-GitHub-Action@5.4.16
        with:
          reports: coverage/lcov.info
          targetdir: coverage-report
          reporttypes: MarkdownSummaryGithub;Cobertura

      - name: 生成业务核心 LCOV（过滤 UI/生成代码/TTS 引擎）
        run: |
          awk '
            BEGIN{ FS=":" }
            /^SF:/ {
              path=substr($0,4);
              norm=path; gsub(/\\/, "/", norm); # 统一路径分隔符
              inc=1;
              if (norm ~ /^lib\/.*\/presentation\//) inc=0;            # UI 层
              else if (norm ~ /^lib\/shared\/widgets\//) inc=0;         # 通用控件
              else if (norm ~ /\/generated\//) inc=0;                    # 生成目录
              else if (norm ~ /\.g\.dart$/) inc=0;                       # 生成文件
              else if (norm ~ /^lib\/features\/audio\/services\/tts_engine_service\.dart$/) inc=0; # TTS 引擎（阶段性排除）
            }
            { if (inc==1) print $0 }
          ' coverage/lcov.info > coverage/lcov.core.info

      - name: 发布覆盖率摘要 (中文图表)
        run: |
          echo "## 📊 测试覆盖率报告 (中文)" >> $GITHUB_STEP_SUMMARY

          # 计算总体覆盖率并生成徽章（中文）
          perl -ne '
            if(/^LF:(\d+)/){$total+=$1}elsif(/^LH:(\d+)/){$covered+=$1}
            END {
              $pct = $total > 0 ? ($covered / $total * 100) : 0;
              $color = $pct >= 80 ? "green" : ($pct >= 50 ? "orange" : "red");
              printf "\n### 总体覆盖率：**%.2f%%**\n", $pct;
              printf "![覆盖率徽章](https://img.shields.io/badge/coverage-%.2f%%25-%s?style=for-the-badge)\n\n", $pct, $color;
              print "- **已覆盖行数**：$covered\n";
              print "- **总行数**：$total\n";
            }
          ' coverage/lcov.info >> $GITHUB_STEP_SUMMARY

          # 统计各文件覆盖率并输出 Top 10（中文表格）
          awk '
            BEGIN{ FS=":" }
            /^SF:/ { if (have) { cov=(lf>0?lh/lf*100:0); printf("%0.2f\t%s\t%d/%d\n", cov, file, lh, lf) } ; file=substr($0,4); lf=0; lh=0; have=1; next }
            /^LF:/ { lf=$2+0; next }
            /^LH:/ { lh=$2+0; next }
            /^end_of_record/ { cov=(lf>0?lh/lf*100:0); printf("%0.2f\t%s\t%d/%d\n", cov, file, lh, lf); have=0 }
          ' coverage/lcov.info |
          sort -nr |
          head -n 10 |
          awk -F"\t" 'BEGIN { print "\n#### 文件覆盖率 Top 10\n"; print "| 序号 | 文件 | 覆盖率 | 行(覆盖/总) |"; print "|:--:|:--|:--:|:--:|" } { printf "| %d | %s | %s%% | %s |\n", NR, $2, $1, $3 }' >> $GITHUB_STEP_SUMMARY

      - name: 校验业务核心覆盖率阈值 (≥ 90%)
        run: |
          THRESHOLD=90
          if [ ! -s coverage/lcov.core.info ]; then
            echo "❌ 未生成业务核心覆盖率文件 coverage/lcov.core.info" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          CORE_PCT=$(awk -F: '/^LF:/{lf+=$2+0} /^LH:/{lh+=$2+0} END{ if(lf>0) printf("%.2f", (lh/lf*100)); else print "0" }' coverage/lcov.core.info)
          echo "\n### 覆盖率门槛：业务核心 ${CORE_PCT}% (目标 ≥ ${THRESHOLD}%)" >> $GITHUB_STEP_SUMMARY
          awk -v pct="$CORE_PCT" -v thr="$THRESHOLD" 'BEGIN { if (pct+0 >= thr) exit 0; else exit 1 }'
          if [ $? -ne 0 ]; then
            echo "❌ 业务核心覆盖率未达标：${CORE_PCT}% < ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ 业务核心覆盖率达标：${CORE_PCT}% ≥ ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 发布覆盖率评论
        uses: thollander/actions-comment-pull-request@v2
        if: github.event_name == 'pull_request'
        with:
          message: |
            ## 📊 测试覆盖率更新
            本次推送的测试覆盖率摘要已发布在 [Job Summary](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})。
          comment_tag: coverage-report

      - name: 上传覆盖率产物
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
